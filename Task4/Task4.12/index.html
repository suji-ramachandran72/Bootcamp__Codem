<!--Task 12 – Quiz Engine 
Requirement: 
1. Create an array called quiz where each object has: 
a. question (string) 
b. options (array of strings) 
c. answer (string) 
Ex: quiz = [ 
{ 
question: "What is JavaScript?", 
options: ["Language", "Framework", "Database"], 
answer: "Language" 
}, 
{ 
question: "Which keyword declares a variable?", 
options: ["var", "loop", "print"], 
answer: "var" 
} 
]; 
2. Display one question at a time with clickable options. 
3. Check if the selected option is correct. 
4. Track the user’s score in a variable. 
5. Display the next question after answering. 
6. Show the final score at the end of the quiz. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
            margin-top:50px;
        }
        #quizcontainer{
            width:300px;
            margin:auto;
            padding:20px;
            border:1px solid #ccc;
            border-radius:8px;
        }
        button{
            margin:8px 0;
            padding:8px 15px;
            width:100%;
            border:none;
            background-color: #4CAF50;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }
        button:hover{
            background-color:#45a049;
        }
        
        h3{
            margin-bottom:15px;
        }
        
    </style>
</head>
<body>
    <h1>Quiz Engine</h1>
    <div id="quizcontainer"></div>
    <script>
       let  quiz = [ 
{ 
question: "What is JavaScript?", 
options: ["Language", "Framework", "Database"], 
answer: "Language" 
}, 
{ 
question: "Which keyword declares a variable?", 
options: ["var", "loop", "print"], 
answer: "var" 
} 
];   
  let currentQuestion=0;
  let score=0;
  let container=document.getElementById("quizcontainer");
  function loadQuestion(){
    if(currentQuestion >=quiz.length){
        container.innerHTML="<h3>Final Score:"+score+"/"+quiz.length +"</h3>";
        return;

    }
    let q=quiz[currentQuestion];
    container.innerHTML="<h3> "+ q.question+"</h3>";
    q.options.forEach(function(option){
        let btn=document.createElement("button");
        btn.textContent=option;
        btn.onclick=function(){
            checkAnswer(option);
        };
        container.appendChild(btn);
        container.appendChild(document.createElement("br"));
    });

  }
  function checkAnswer(selected){
    if(selected==quiz[currentQuestion].answer){
        score++;
    }currentQuestion++;
    loadQuestion();
  }
  loadQuestion();
      </script>
</body>
</html>
