<!--Task 19 – Dashboard Summary 
Requirements: 
1. Create arrays: 
a. users (number of users or objects) 
b. orders (array of order amounts) 
c. revenue (array of revenue numbers) 
Ex :  
users = [1,2,3,4] 
orders = [500, 1200, 800] 
revenue = [5000, 3000] 
2. Calculate totals users,orders,revenue using loops
3. Display the totals in separate summary cards on the page.  
a. Total Users: 4 
b. Total Orders: 3 
c. Total Revenue: ₹8000 
4. Update summary dynamically if any array changes.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2{
            text-align: center;
            font-weight: bold;
        }
        .card{
            display:inline-block;
            padding:20px;
            margin:10px;
            width:180px;
            text-align:center;
            border-radius:10px;
            background:#f2f2f2;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            font-family:Arial;
        }
        #button{
           display:inline-block;
            padding:20px;
            margin:10px;
            width:155px;
            text-align:center;
            border-radius:10px;
            background:#f2f2f2;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            font-family:Arial; 
        }
    </style>
</head>
<body>
    <h2>Dashboard Summary</h2>
    <div id="dashboard"></div>
    <script>
       let users=[1,2,3,4];
       let orders=[500, 1200, 800];
       let revenue=[5000, 3000];
       function calculateTotals(){
        let totalUsers=0;
        for(let i=0;i<users.length;i++){
            totalUsers++;
        }
       
       let totalOrders=0;
       for(let i=0;i<orders.length;i++){
            totalOrders++;
        }
        let totalRevenue=0;
        for(let i=0;i<revenue.length;i++){
            totalRevenue +=revenue[i];
        }
        dashboard.innerHTML=`
        <div class="card">
            <h3>Total Users <p>${totalUsers}</p> <h3>
            
        </div>
        <div class="card">
            <h3>Total Orders <p>${totalOrders}</p> <h3>
        </div>
        <div class="card">
            <h3>Total Revenue <p> ${totalRevenue}</p><h3>
              
        </div>
        `;
    }
    calculateTotals();
    function addUsers(){
        users.push(users.length+1);
        calculateTotals();
    }
     function addOrders(){
        let amount=Math.floor(Math.random()*2000)+500;
        orders.push(amount);
        calculateTotals();
    }
     function addRevenues(){
        let amount=Math.floor(Math.random()*5000)+1000;
        revenue.push(amount);
        calculateTotals();
    }



    </script>
    <button  id="button" onclick="addUsers()">Add User</button>
    <button id="button" onclick="addOrders()">Add Order</button>
     <button  id="button" onclick="addRevenues()">Add Revenues</button>

</body>
</html>
