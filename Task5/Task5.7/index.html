<!--Task 7: Form Validation – Email Format Check 
Requirements 
● Create an HTML form with an email input field. 
● Write JavaScript code to validate the email format. 
● Check whether the email contains @ and . characters. 
● Display a success or error message using console.log(). 
● Prevent form submission if the email format is invalid.-->
<style>
    body{
        font-family:Arial, Helvetica, sans-serif;
        background-color: #f2f2f2;
    }
    form{
        width:300px;
        margin:100px auto;
        padding:20px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 0 10px gray;
    }
    label{
        font-weight: bold;
    }
    input{
        width:100%;
        padding:8px;
        margin-top:5px;

    }
    button{
        width:100%;
        padding:10px;
        background-color: #4CAF50;
        color:white;
        margin-top:10px;
        border:none;
        cursor:pointer;
    }
    button:hover{
        background-color: #45a049;
    }
</style>
<body>
    <form id="form">
    <label>Email</label>
    <input type="text" id="email">
    <button id="button">Submit</button>
</form>
<script>
    let email=document.getElementById("email");
    let form=document.getElementById("form");
    form.addEventListener("submit",function(event){
        if(email.value.includes('@') && email.value.includes('.')  ){
            console.log("Login successful...");
            event.preventDefault();
        }else{
        console.log("Error....Email format is invalid");
        event.preventDefault();
        }
        
    });

</script>
</body>
