<!--Task 9: Combined Form Validation Program 
Requirements 
● Create an HTML form with: 
○ name 
○ email 
○ password 
● Validate all fields using JavaScript. 
● Check for empty values. 
● Validate email format. 
● Validate password length. 
● Display validation messages using console.log().-->
<style>
    body{
        font-family:Arial, Helvetica, sans-serif;
        background-color: #f2f2f2;
    }
    form{
        width:300px;
        margin:100px auto;
        padding:20px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 0 10px gray;
    }
    label{
        font-weight: bold;
    }
    input{
        width:100%;
        padding:8px;
        margin-top:5px;

    }
    button{
        width:100%;
        padding:10px;
        background-color: #4CAF50;
        color:white;
        margin-top:10px;
        border:none;
        cursor:pointer;
    }
    button:hover{
        background-color: #45a049;
    }
</style>
<body>
    <form id="form">
    <label>Name</label>
    <input type="text" id="name"><br><br>
    <label>Email</label>
    <input type="text" id="email"><br><br>
    <label>Password</label>
    <input type="password" id="password"><br><br>
    <button type="submit" id="button">Submit</button>
</form>
<script>
    let name=document.getElementById("name");
    let email=document.getElementById("email");
    let password=document.getElementById("password");
    let form=document.getElementById("form");
    form.addEventListener("submit",function(event){
       
        if(name.value == "" || email.value == "" || password.value == ""){
            console.log("All fields are Required");
             event.preventDefault();
        }
        else if(password.value.length < 8){
            console.log("Password must containe atleast 8 characters...");
             event.preventDefault();
         }
        else if(!email.value.includes('@') && email.value.includes('.')  ){
            console.log("Invalide email format");  
             event.preventDefault(); 
        }

        else{
            console.log("Form submitted successfully!!!!");
            event.preventDefault(); 
        }

        
        
        
    });

</script>
</body>
