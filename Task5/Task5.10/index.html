<!--Task 10: Advanced Function Validation Utility 
Requirements 
● Create separate functions for: 
○ checking empty input 
○ validating email format 
○ validating password length 
● Use these functions inside a main validation function. 
● Call the main function on form submission. 
● Display validation results using console.log().-->
<style>
    body{
        font-family:Arial, Helvetica, sans-serif;
        background-color: #f2f2f2;
    }
    form{
        width:300px;
        margin:100px auto;
        padding:20px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 0 10px gray;
    }
    label{
        font-weight: bold;
    }
    input{
        width:100%;
        padding:8px;
        margin-top:5px;

    }
    button{
        width:100%;
        padding:10px;
        background-color: #4CAF50;
        color:white;
        margin-top:10px;
        border:none;
        cursor:pointer;
    }
    button:hover{
        background-color: #45a049;
    }
</style>
<body>
    <form onsubmit="return mainValidation(event)">
    <label>Name</label>
    <input type="text" id="name"><br><br>
    <label>Email</label>
    <input type="text" id="email"><br><br>
    <label>Password</label>
    <input type="password" id="password"><br><br>
    <button type="submit" id="button">Submit</button>
</form>
<script>
    function checkEmpty(value){
        return value==="";
    }
    function validateEmail(email){
        return email.includes('@') && email.includes('.');
    }
    function validatePassword(password){
        return password.length >=6;
    }
    function mainValidation(event){
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let password=document.getElementById("password").value;
    event.preventDefault();
    if(checkEmpty(name) || checkEmpty(email)|| checkEmpty(password)){
        console.log("Fields are not empty");
        return false;
    }
    if(!validateEmail(email)){
        console.log("Invalid enail");
        return false;
    }
    if(!validatePassword(password)){
        console.log("Password must be 8 characters");
        return false;
    }
    console.log("Validation successfully");
    return true;
    }
</script>
</body>
